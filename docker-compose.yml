services:
  php:
    build: .
    container_name: tpl3-php
    volumes:
      - .:/var/www/html
    networks:
      - tpl3-network

  nginx:
    image: nginx:alpine
    container_name: tpl3-nginx
    ports:
      - "8086:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - tpl3-network

  postgres_db:
    image: postgres:16
    container_name: postgres_iibs
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sonbeckscoding
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - db_data_iibs:/var/lib/postgresql/data
    networks:
      - tpl3-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_iibs
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: passer
    ports:
      - "8080:80"
    depends_on:
      - postgres_db
    networks:
      - tpl3-network

volumes:
  db_data_iibs:

networks:
  tpl3-network:
    driver: bridge